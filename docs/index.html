<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Cientistas</title>

    <link rel="icon" href="/assets/icons/favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="/manifest.json">
</head>

<body class="bg-background-blue overflow-hidden m-0 p-0 font-['Fredoka']">

    <div id="loader-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-background-blue">
        <div id="loading-text" class="text-white text-3xl font-bold animate-pulse">Carregando... 0%</div>
    </div>

    <div id="menu-screen" class="hidden fixed inset-0 flex flex-col">
        <header class="h-[10vh] min-h-[80px] bg-white grid grid-cols-[200px_1fr_200px] items-center px-8 shadow-[inset_0_-8px_10px_-5px_rgba(0,0,0,0.15)]">
            <img src="/assets/logos/Logo.png" alt="Logo" class="h-3/4 justify-self-start object-contain">
            <h2 class="text-3xl font-bold text-font-dark text-center">Escolha o Laboratório!</h2>
            <button class="bg-primary-pink text-white px-6 py-2.5 rounded-full font-bold border-b-4 border-primary-pink-dark transition-all active:scale-95 justify-self-end">SAIR</button>
        </header>

        <main class="carousel-area flex-1 relative overflow-hidden"></main> 

        <footer class="h-[60px] bg-white flex items-center justify-center shadow-[inset_0_8px_10px_-5px_rgba(0,0,0,0.15)]">
            <div id="menu-controls" class="flex gap-4"></div>
        </footer>
    </div>

    <div id="game-screen" class="hidden fixed inset-0 flex flex-col">
        <header class="h-[10vh] min-h-[80px] bg-white grid grid-cols-[200px_1fr_200px] items-center px-8 shadow-md z-10">
            <img src="/assets/logos/Logo.png" alt="Logo" class="h-3/4 object-contain" />
            <h2 id="game-title" class="text-2xl font-bold text-font-dark text-center truncate italic">...</h2>
            <button id="game-exit-button" class="bg-primary-pink text-white px-6 py-2.5 rounded-full font-bold border-b-4 border-primary-pink-dark transition-all active:scale-95 justify-self-end">SAIR</button>
        </header>

        <div class="canvas-wrapper flex-1 relative overflow-hidden bg-black">
            <canvas id="pixi-canvas" class="w-full h-full block"></canvas>
            </div>

        <footer class="h-[60px] bg-white flex items-center justify-center">
            <div id="game-controls" class="flex gap-2"></div>
        </footer>
    </div>

    <div id="custom-modal" class="hidden fixed inset-0 z-[9999] bg-black/60 backdrop-blur-sm flex items-center justify-center">
        <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-md w-full text-center border-t-8 border-primary-pink">
            <p id="modal-message" class="text-font-dark text-xl font-bold mb-6">...</p>
            <button id="modal-ok-btn" class="bg-primary-pink text-white px-8 py-3 rounded-full font-bold border-b-4 border-primary-pink-dark active:scale-95 transition-all">OK</button>
        </div>
    </div>

    <script type="module" src="/src/main.ts"></script>

</body>
</html>
